<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>
Domain Reputation Intelligence Engine
</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

textarea{
width:100%;
height:150px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#222;
color:white;
padding:10px;
}

td{
border:1px solid #ddd;
padding:10px;
vertical-align:top;
}

</style>

</head>

<body>

<div class="card">

<h2>
Domain Reputation Intelligence Engine
</h2>

<textarea id="domains"
placeholder="google.com
yahoo.com"></textarea>

<br>

<button onclick="scanDomains()">
Scan
</button>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Domain</th>
<th>SPF</th>
<th>SPF Lookups</th>
<th>DMARC</th>
<th>DKIM</th>
<th>MX</th>
<th>NS</th>
<th>Registrar</th>
<th>Age</th>
<th>Mailgun</th>
<th>SendGrid</th>
<th>SparkPost</th>
<th>Score</th>

</tr>

</thead>

<tbody id="results">

</tbody>

</table>

</div>

<script>

async function scanDomains(){

const tbody =
document.getElementById(
"results"
);

tbody.innerHTML = "";

const domains =
document.getElementById(
"domains"
)
.value
.split("\n")
.filter(
x=>x.trim()
);

for(const domain of domains){

const res =
await fetch(
"/check?domain="
+
encodeURIComponent(
domain
)
);

const data =
await res.json();

tbody.innerHTML += `

<tr>

<td>${data.domain}</td>

<td>
${data.spf_record || "-"}
</td>

<td>
${data.spf_lookup_count}
</td>

<td>
${data.dmarc_record || "-"}
</td>

<td>
${data.dkim_selectors.join("<br>")}
</td>

<td>
${data.mx_records.join("<br>")}
</td>

<td>
${data.nameservers.join("<br>")}
</td>

<td>
${data.registrar}
</td>

<td>
${Math.floor(
data.domain_age/365
)} Years
</td>

<td>
${data.mailgun ? "YES" : "NO"}
</td>

<td>
${data.sendgrid ? "YES" : "NO"}
</td>

<td>
${data.sparkpost ? "YES" : "NO"}
</td>

<td>
${data.score}
</td>

</tr>

`;

}

}

</script>

</body>
</html>
